<style>
  .twk-covers,
  .twk-covers * {
    box-sizing: border-box;
  }

  .twk-covers {
    --pad: 8px;
    --gap: 8px;
    --cols: 5;
    --radius: 0px;
    --card-w: calc((100vw - (var(--pad) * 2) - (var(--gap) * (var(--cols) - 1))) / var(--cols));
    --card-h: calc(var(--card-w) * 16 / 9);
    width: 100vw;
    margin-left: calc(50% - 50vw);
    min-height: 900vh;
    background: #000;
    position: relative;
    font-family: var(--font-body, Arial, sans-serif);
  }

  .twk-covers__sticky {
    position: sticky;
    top: 0;
    height: 100svh;
    padding: var(--pad);
    overflow: hidden;
  }

  .twk-covers__viewport {
    position: relative;
    width: 100%;
    height: calc(100svh - (var(--pad) * 2));
    overflow: hidden;
    transition: filter 0.35s ease, transform 0.35s ease;
  }

  .twk-covers.is-viewer-open .twk-covers__viewport {
    filter: brightness(0.4);
  }

  .twk-covers__grid {
    display: grid;
    grid-template-columns: repeat(var(--cols), minmax(0, 1fr));
    gap: var(--gap);
    width: 100%;
    height: 100%;
  }

  .twk-covers__lane {
    position: relative;
    height: 100%;
    overflow: hidden;
  }

  .twk-covers__stack {
    position: absolute;
    left: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: var(--gap);
    will-change: transform;
  }

  .twk-cover {
    position: relative;
    width: 100%;
    height: var(--card-h);
    border: 0;
    padding: 0;
    border-radius: var(--radius);
    overflow: hidden;
    background: #101010;
    cursor: pointer;
    appearance: none;
    isolation: isolate;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset, 0 12px 30px rgba(0,0,0,0.24);
  }

  .twk-cover::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    border-radius: inherit;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01) 28%, rgba(0,0,0,0.08) 100%),
      radial-gradient(circle at 50% 0%, rgba(255,255,255,0.06), transparent 48%);
    opacity: 0.39;
    transition: opacity 0.25s ease;
  }

  .twk-cover__shine {
    position: absolute;
    inset: -18%;
    z-index: 3;
    pointer-events: none;
    background: linear-gradient(115deg, transparent 34%, rgba(255,255,255,0.16) 50%, transparent 66%);
    transform: translateX(-145%) skewX(-12deg);
    opacity: 0;
  }

  .twk-cover img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    object-position: center center;
    background: #000;
    transform: scale(1) translate3d(0,0,0);
    transition: transform 0.55s cubic-bezier(.22,.8,.2,1), filter 0.28s ease;
    filter: contrast(1.02) saturate(1.02);
    /* will-change снят — 96 GPU-слоёв убивали VRAM */
  }

  .twk-cover:hover {
    transform: translateY(-2px) scale(1.015);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.05) inset, 0 18px 42px rgba(0,0,0,0.3);
  }

  .twk-cover:hover .twk-cover__shine {
    animation: twkShine 0.9s ease forwards;
    opacity: 1;
  }

  .twk-cover:hover img {
    transform: scale(1.035) translate3d(0,-2px,0);
    filter: contrast(1.05) saturate(1.08);
  }

  .twk-covers__fade-top,
  .twk-covers__fade-bottom {
    position: absolute;
    left: 0;
    width: 100%;
    z-index: 20;
    pointer-events: none;
  }

  .twk-covers__fade-top {
    top: 0;
    height: 118px;
    background: linear-gradient(180deg, rgba(0,0,0,1) 0%, rgba(0,0,0,0.95) 14%, rgba(0,0,0,0.72) 40%, rgba(0,0,0,0.28) 72%, rgba(0,0,0,0) 100%);
  }

  .twk-covers__fade-bottom {
    bottom: 0;
    height: 118px;
    background: linear-gradient(0deg, rgba(0,0,0,1) 0%, rgba(0,0,0,0.95) 14%, rgba(0,0,0,0.72) 40%, rgba(0,0,0,0.28) 72%, rgba(0,0,0,0) 100%);
  }

  .twk-viewer {
    position: fixed;
    inset: 0;
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.28s ease;
  }

  .twk-viewer.is-open { opacity: 1; pointer-events: auto; }

  .twk-viewer__bg {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
  }

  .twk-viewer__content {
    position: relative;
    z-index: 2;
    max-width: 94vw;
    max-height: 92vh;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translateY(16px) scale(0.97);
    transition: transform 0.28s cubic-bezier(.22,.8,.2,1);
  }

  .twk-viewer.is-open .twk-viewer__content { transform: translateY(0) scale(1); }

  .twk-viewer__img {
    width: auto; height: auto;
    max-width: min(80vw, 600px);
    max-height: 80vh;
    display: block;
    object-fit: contain;
    border-radius: var(--radius);
    box-shadow: 0 30px 80px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.06);
    background: transparent;
  }

  .twk-viewer__close {
    position: absolute;
    top: 12px; right: 12px;
    z-index: 3;
    width: 32px; height: 32px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 0;
    background: rgba(29,29,31,0.7);
    color: #fff;
    font-size: 0;
    line-height: 1;
    cursor: pointer;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.35s var(--ease-out, ease), border-color 0.35s var(--ease-out, ease), transform 0.35s var(--ease-out, ease);
  }

  /* Крестик из двух линий */
  .twk-viewer__close::before,
  .twk-viewer__close::after {
    content: '';
    position: absolute;
    width: 11px;
    height: 1px;
    background: #fff;
    transition: background 0.35s var(--ease-out, ease);
  }
  .twk-viewer__close::before { transform: rotate(45deg); }
  .twk-viewer__close::after { transform: rotate(-45deg); }

  .twk-viewer__close:hover {
    background: #fff;
    border-color: #fff;
    transform: scale(1.05);
  }
  .twk-viewer__close:hover::before,
  .twk-viewer__close:hover::after { background: #1d1d1f; }

  .twk-viewer__close:active { transform: scale(0.95); }

  @keyframes twkShine {
    0% { transform: translateX(-145%) skewX(-12deg); }
    100% { transform: translateX(145%) skewX(-12deg); }
  }

  @media (max-width: 1440px) {
    .twk-covers { --cols: 4; min-height: 800vh; }
  }

  @media (max-width: 767px) {
    /* На мобиле — статичный grid без какой-либо динамики.
       Ноль transitions, ноль animations, ноль transform — иначе iOS Safari моргает. */
    .twk-covers {
      --cols: 2; --pad: 12px; --gap: 12px; --radius: 0px;
      min-height: 0 !important;
      height: auto !important;
    }
    .twk-covers, .twk-covers * {
      transition: none !important;
      animation: none !important;
    }
    .twk-covers__sticky {
      position: static !important;
      height: auto !important;
      transform: none !important;
    }
    .twk-covers__viewport {
      height: auto !important;
      overflow: visible !important;
      padding: 0 var(--pad) !important;
      filter: none !important;
      transform: none !important;
    }
    .twk-covers__grid {
      display: grid !important;
      grid-template-columns: repeat(2, 1fr) !important;
      gap: var(--gap) !important;
      height: auto !important;
    }
    .twk-covers__lane { display: contents !important; }
    .twk-covers__stack[data-stack="prev"],
    .twk-covers__stack[data-stack="next"] { display: none !important; }
    .twk-covers__stack[data-stack="current"] {
      display: contents !important;
      transform: none !important;
      will-change: auto !important;
    }
    .twk-covers__fade-top, .twk-covers__fade-bottom { display: none !important; }
    .twk-cover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.15) !important;
      transform: none !important;
      will-change: auto !important;
    }
    .twk-cover::before, .twk-cover__shine { display: none !important; }
    .twk-cover img { filter: none !important; transform: none !important; will-change: auto !important; }
    .twk-cover, .twk-cover::before, .twk-viewer__img { border-radius: var(--radius); }
    .twk-viewer { padding: 60px 10px 10px; }
    .twk-viewer__img { max-width: 92vw; max-height: 80vh; }
    .twk-viewer__close { width: 28px; height: 28px; }
    .twk-viewer__close::before, .twk-viewer__close::after { width: 10px; }
  }
</style>

      if (count === 5) return [{speed:.58,start:.0},{speed:.44,start:.12},{speed:.32,start:.06},{speed:.44,start:.12},{speed:.58,start:.0}];
      if (count === 4) return [{speed:.40,start:.0},{speed:.52,start:.10},{speed:.64,start:.20},{speed:.76,start:.30}];
      /* 3 колонки (мобиле) */
      return [{speed:.38,start:.0},{speed:.26,start:.06},{speed:.38,start:.0}];
    }

    function ensureMinItems(columns, minPerColumn) {
      return columns.map(function (col) {
        if (col.length === 0) return [];
        var out = col.slice(); var i = 0;
        while (out.length < minPerColumn) { out.push(col[i % col.length]); i++; }
        return out;
      });
    }

    var viewer = document.createElement('div');
    viewer.className = 'twk-viewer';
    viewer.innerHTML =
      '<div class="twk-viewer__bg"></div>' +
      '<div class="twk-viewer__content">' +
        '<button class="twk-viewer__close" type="button" aria-label="Закрыть"></button>' +
        '<img class="twk-viewer__img" src="" alt="Просмотр обложки">' +
      '</div>';

    function cardHTML(photo, idx) {
      // Первые 6 — eager+sync (выше первого экрана), остальные — lazy+async.
      // На мобиле всё eager — иначе iOS выгружает картинки из памяти и
      // показывает мигания при скролле назад.
      var isMobile = window.innerWidth < 768;
      var loading = (isMobile || idx < 6) ? 'eager' : 'lazy';
      var decoding = isMobile ? 'sync' : 'async';
      return '<button class="twk-cover" type="button" data-full="' + photo.src + '">' +
        '<span class="twk-cover__shine"></span>' +
        '<img src="' + photo.src + '" alt="' + photo.label + '" loading="' + loading + '" decoding="' + decoding + '">' +
      '</button>';
    }

    function build() {
      root.innerHTML = '';
      var activeColumns = getActiveColumns();
      var settings = getSettings(activeColumns.length);
      root.style.setProperty('--cols', activeColumns.length);
      var minItems = 8;
      var columns = ensureMinItems(activeColumns, minItems);

      var sticky = document.createElement('div'); sticky.className = 'twk-covers__sticky';
      var viewport = document.createElement('div'); viewport.className = 'twk-covers__viewport';
      var grid = document.createElement('div'); grid.className = 'twk-covers__grid';
      /* Затемнения отключены */

      // На мобиле создаём только current stack (-80 <img> = быстрее DOM)
      var stacks = (window.innerWidth < 768) ? ['current'] : ['prev','current','next'];
      columns.forEach(function (photos, colIndex) {
        var lane = document.createElement('div'); lane.className = 'twk-covers__lane';
        lane.setAttribute('data-speed', settings[colIndex].speed);
        lane.setAttribute('data-start', settings[colIndex].start);
        var html = photos.map(function(p,i){ return cardHTML(p, i); }).join('');
        stacks.forEach(function(n) {
          var s = document.createElement('div'); s.className = 'twk-covers__stack';
          s.setAttribute('data-stack', n); s.innerHTML = html; lane.appendChild(s);
        });
        grid.appendChild(lane);
      });

      viewport.appendChild(grid);
      /* fadeTop и fadeBottom убраны */
      sticky.appendChild(viewport);
      root.appendChild(sticky);
      root.appendChild(viewer);
      bindCards(); updateColumns();
    }

    function bindCards() {
      var rm = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      // Делегирование: один listener на root вместо 96 — снимает нагрузку
      var hovered = null;
      if (!root.dataset.delegated) {
        root.dataset.delegated = '1';
        root.addEventListener('mousemove', function(e){
          if (rm || window.innerWidth < 768) return;
          var card = e.target.closest('.twk-cover');
          if (!card) return;
          if (hovered && hovered !== card) {
            hovered.style.transform = '';
            var oldImg = hovered.querySelector('img');
            if (oldImg) oldImg.style.transform = '';
          }
          hovered = card;
          var img = card.querySelector('img');
          var rect = card.getBoundingClientRect();
          var px = (e.clientX - rect.left) / rect.width, py = (e.clientY - rect.top) / rect.height;
          card.style.transform = 'perspective(1000px) rotateX(' + ((0.5-py)*6) + 'deg) rotateY(' + ((px-0.5)*6) + 'deg) translateY(-2px) scale(1.01)';
          if (img) img.style.transform = 'scale(1.03) translate3d(' + ((px-0.5)*6) + 'px,' + ((py-0.5)*6) + 'px,0)';
        }, { passive: true });
        root.addEventListener('mouseleave', function(){
          if (hovered) {
            hovered.style.transform = '';
            var img = hovered.querySelector('img');
            if (img) img.style.transform = '';
            hovered = null;
          }
        });
        root.addEventListener('click', function(e){
          var card = e.target.closest('.twk-cover');
          if (!card) return;
          var img = card.querySelector('img');
          viewer.querySelector('.twk-viewer__img').src = card.getAttribute('data-full') || (img && img.src) || '';
          viewer.classList.add('is-open'); root.classList.add('is-viewer-open'); document.body.style.overflow = 'hidden';
        });
      }
    }

    function closeViewer() { viewer.classList.remove('is-open'); root.classList.remove('is-viewer-open'); document.body.style.overflow = ''; }

    var cachedHeight = 0, cachedTop = 0, cachedVh = 0;
    function cacheRect() { cachedHeight = root.offsetHeight; cachedVh = window.innerHeight; }
    window.addEventListener('resize', cacheRect);
    setTimeout(cacheRect, 100);

    function updateColumns() {
      // На мобиле параллакс выключен — обычная сетка
      if (window.innerWidth < 768) return;
      if (!cachedHeight) cacheRect();
      cachedTop = root.getBoundingClientRect().top;
      var total = Math.max(cachedHeight - cachedVh, 1);
      var progress = Math.min(Math.max(-cachedTop / total, 0), 1);
      root.querySelectorAll('.twk-covers__lane').forEach(function (lane) {
        var prev = lane.querySelector('[data-stack="prev"]'), cur = lane.querySelector('[data-stack="current"]'), next = lane.querySelector('[data-stack="next"]');
        if (!prev || !cur || !next) return;
        var gap = parseFloat(getComputedStyle(cur).gap || 0), loop = cur.offsetHeight + gap;
        var speed = parseFloat(lane.getAttribute('data-speed') || '0.5'), start = parseFloat(lane.getAttribute('data-start') || '0');
        var travel = loop * 1.2, offset = -((start * loop) + (progress * travel * speed));
        while (offset < -loop) offset += loop; while (offset > 0) offset -= loop;
        prev.style.transform = 'translate3d(0,' + (offset - loop) + 'px,0)';
        cur.style.transform = 'translate3d(0,' + offset + 'px,0)';
        next.style.transform = 'translate3d(0,' + (offset + loop) + 'px,0)';
      });
    }

    viewer.addEventListener('click', function (e) { if (e.target.classList.contains('twk-viewer__bg') || e.target.classList.contains('twk-viewer__close')) closeViewer(); });
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && viewer.classList.contains('is-open')) closeViewer(); });
    window.addEventListener('resize', build);
    /* Скролл через rAF, но не чаще 30 FPS — снимает 50% CPU
       без визуальной разницы для медленного параллакса */
    var ticking = false, lastUpdate = 0;
    window.addEventListener('scroll', function() {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(function(now) {
        if (now - lastUpdate >= 32) {  // 32ms ≈ 30 FPS
          updateColumns();
          lastUpdate = now;
        }
        ticking = false;
      });
    }, { passive: true });
    build();
  })();
</script>
