<!-- ============================================
     БЛОК 5A: БЕГУЩАЯ ПОЛОСКА КЛИЕНТОВ
     T123 блок — горизонтальная бегущая строка с аватарками

     Здесь меняй:
     — Фото клиентов: class="client-photo" (src — ссылка)
     — Имя: class="client-name"
     — Роль: class="client-role"
     — Надпись сверху: class="clients-heading"
     — Надпись снизу: class="clients-subheading"
     — Скорость прокрутки: переменная speed в скрипте (сейчас 0.8)

     ФОТО АВАТАРОК:
     — Размер: 400×400 px (квадратное, обрежется в круг)
     — Формат: JPG или PNG, до 100 КБ
     — Лицо по центру кадра

     НАСТРОЙКИ ПК (десктоп):
     — Аватарка: 56×56px, отступ между элементами: 48px
     — Имя: 17px, роль: 12px

     НАСТРОЙКИ ПЛАНШЕТ (до 1068px):
     — Имя: 15px, отступ: 40px

     НАСТРОЙКИ МОБИЛЕ (до 734px):
     — Аватарка: 48×48px, отступ: 32px
     — Имя: 14px, роль: 11px
     ============================================ -->
<style>
/* Фон — surface (#f5f5f7) */
.clients {
  margin: 80px 0 20px;
  padding: 0;
  overflow: hidden;
  position: relative;
  background: var(--surface, #f5f5f7);
  font-family: 'Inter Tight', sans-serif;
}

/* Надпись «Мне доверяют» сверху */
.clients-heading {
  padding: 32px var(--edge) 0;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--muted, #86868b);
}

/* Обёртка бегущей строки */
.clients-marquee {
  padding: 24px 0 24px;
  position: relative;
  overflow: hidden;
}

/* Надпись «Лучшие ведущие» снизу */
.clients-subheading {
  padding: 0 var(--edge) 32px;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  text-align: right;
  color: var(--muted, #86868b);
}

/* Трек */
.clients-track {
  display: flex;
  align-items: center;
  gap: 48px;
  width: max-content;
  will-change: transform;
}

/* Один элемент */
.client {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
  cursor: default;
  text-decoration: none;
}

/* Аватарка — единственный элемент с border-radius:50% */
.client-photo {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  filter: grayscale(0.3);
  transition: filter 0.4s cubic-bezier(0.28, 0.11, 0.32, 1),
              transform 0.4s cubic-bezier(0.28, 0.11, 0.32, 1);
}
.client:hover .client-photo {
  filter: grayscale(0);
  transform: scale(1.06);
}

/* Имя клиента */
.client-name {
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.4px;
  white-space: nowrap;
  color: var(--text, #1d1d1f);
}

/* Роль */
.client-role {
  font-size: 12px;
  font-weight: 400;
  letter-spacing: -0.1px;
  white-space: nowrap;
  color: var(--muted, #86868b);
}

/* Снежинка-разделитель */
.client-star {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  color: var(--muted, #86868b);
  opacity: 0.35;
  animation: spin 6s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Градиентные края — затухание в --surface */
.clients-marquee::before,
.clients-marquee::after {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  width: 80px;
  z-index: 5;
  pointer-events: none;
}
.clients-marquee::before {
  left: 0;
  background: linear-gradient(to right, #f5f5f7, transparent);
}
.clients-marquee::after {
  right: 0;
  background: linear-gradient(to left, #f5f5f7, transparent);
}

/* === Адаптив: планшет (до 1068px) === */
@media (max-width: 1068px) {
  .client-name { font-size: 15px; }
  .clients-track { gap: 40px; }
}

/* === Адаптив: мобилка (до 734px) === */
@media (max-width: 734px) {
  .clients { margin: 48px 0 12px; }
  .clients-marquee { padding: 18px 0 22px; }
  .clients-heading { padding-top: 22px; font-size: 11px; letter-spacing: .4px; }
  .clients-subheading { font-size: 11px; padding-bottom: 22px; letter-spacing: .4px; }
  .clients-track { gap: 32px; }
  .client-photo { width: 48px; height: 48px; }
  .client-name { font-size: 14px; }
  .client-role { font-size: 11px; }
  .client-star { width: 12px; height: 12px; }
  .clients-marquee::before,
  .clients-marquee::after { width: 40px; }
}
</style>

<script>
/* Бесшовная бегущая строка — работает с любым количеством клиентов */
(function() {
  var track = document.getElementById('clientsTrack');
  if (!track) return;

  /* Дублируем контент чтобы заполнить экран */
  track.innerHTML += track.innerHTML;

  var speed = 0.8; /* пикселей за кадр — меняй скорость здесь */
  var pos = 0;
  var paused = false;
  var half = track.scrollWidth / 2;

  /* Reduced-motion: лента стоит, логотипы видны статично */
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  /* Плавное движение без перескоков */
  function move() {
    if (!paused) {
      pos -= speed;
      if (pos <= -half) pos += half;
      track.style.transform = 'translateX(' + pos + 'px)';
    }
    requestAnimationFrame(move);
  }
  requestAnimationFrame(move);

  /* Пауза при наведении */
  track.parentElement.addEventListener('mouseenter', function() { paused = true; });
  track.parentElement.addEventListener('mouseleave', function() { paused = false; });

  /* Пересчитать ширину при ресайзе */
  window.addEventListener('resize', function() { half = track.scrollWidth / 2; });
})();
</script>
