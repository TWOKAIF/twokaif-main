    const a = e.target.closest('a');

    const href = a.getAttribute('href') || '';

    if (/^https?:\/\/t\.me\//.test(href)) goal('goal_telegram');

    // Карточка АГЕНТ в блоке акций
    if (a.closest && a.closest('.promo-card') && /t\.me\/tukaif_agent_bot/.test(href)) goal('goal_agent_open');
    // Карточка МЖ (МУЖЧИНЫ vs ЖЕНЩИНЫ) в блоке акций

    // Раздел АНКЕТЫ в Услугах
    if (a.classList && a.classList.contains('service-item') && /wedding/.test(href)) goal('goal_anketa_service');
  }, {capture:true, passive:true});
})();
