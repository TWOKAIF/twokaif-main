<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="robots" content="noindex,nofollow">
<title>Переход — ТУКАЙФ</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/fonts/inter-tight.css">
<style>
  :root{
    --ink:#1d1d1f;
    --muted:#6e6e73;
    --line:#e5e5e7;
    --soft:#f5f5f7;
    --ease:cubic-bezier(.22,.8,.2,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:#fff;color:var(--ink)}
  body{
    min-height:100svh;
    display:grid;
    grid-template-rows:auto 1fr auto;
    padding:max(24px,env(safe-area-inset-top)) clamp(20px,5vw,64px) max(22px,env(safe-area-inset-bottom));
    font-family:"Inter Tight",sans-serif;
    letter-spacing:0;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    min-height:32px;
    font-size:13px;
    line-height:1;
  }
  .brand-mark{width:18px;height:18px;flex:none;animation:spin 8s linear infinite;transform-box:fill-box;transform-origin:center;will-change:transform}
  .brand-name{font-weight:700}
  .brand-line{width:1px;height:20px;background:var(--line);margin:0 2px}
  .brand-note{color:var(--muted);font-weight:500}
  main{
    width:min(100%,720px);
    align-self:center;
    justify-self:center;
    padding:58px 0 72px;
    text-align:center;
  }
  .eyebrow{
    margin:0 0 18px;
    color:var(--muted);
    font-size:12px;
    font-weight:600;
    line-height:1.2;
    text-transform:uppercase;
  }
  h1{
    margin:0;
    font-size:clamp(48px,8vw,92px);
    font-weight:650;
    line-height:.92;
    letter-spacing:0;
    text-wrap:balance;
  }
  .loader{
    width:min(280px,70vw);
    height:2px;
    margin:34px auto 24px;
    overflow:hidden;
    background:var(--line);
  }
  .loader::after{
    content:"";
    display:block;
    width:100%;
    height:100%;
    background:var(--ink);
    transform:scaleX(0);
    transform-origin:left;
    animation:load 1.3s var(--ease) .12s forwards;
  }
  .status{
    min-height:44px;
    margin:0 auto 24px;
    max-width:420px;
    color:var(--muted);
    font-size:16px;
    line-height:1.38;
    text-wrap:pretty;
  }
  .action{
    width:min(100%,320px);
    min-height:54px;
    margin:0 auto;
    padding:15px 20px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    border:1px solid var(--ink);
    border-radius:4px;
    background:var(--ink);
    color:#fff;
    font-size:15px;
    font-weight:600;
    line-height:1.2;
    text-decoration:none;
    transition:background .2s,color .2s,transform .2s var(--ease);
  }
  .action:hover{background:#fff;color:var(--ink);transform:translateY(-2px)}
  .action:active{transform:scale(.985)}
  .action:focus-visible{outline:3px solid rgba(29,29,31,.2);outline-offset:4px}
  .action svg{width:18px;height:18px;flex:none}
  footer{
    min-height:28px;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    color:var(--muted);
    font-size:12px;
  }
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  @keyframes load{to{transform:scaleX(1)}}
  @media(max-width:520px){
    body{padding-left:20px;padding-right:20px}
    .brand{gap:8px}
    .brand-note{font-size:12px}
    main{padding:44px 0 58px}
    h1{font-size:clamp(46px,15vw,72px)}
    .status{font-size:15px;max-width:340px}
    .action{width:100%;max-width:340px}
  }
  @media(prefers-reduced-motion:reduce){
    .brand-mark,.loader::after{animation:none}
    .loader::after{transform:scaleX(1)}
    .action{transition:none}
  }
</style>
</head>
<body>
  <header class="brand" aria-label="ТУКАЙФ">
    <svg class="brand-mark" viewBox="-3 18.51 80.55 80.55" aria-hidden="true">
      <path fill="currentColor" d="M47.38 41.27L64.44 31.43L74.55 48.93L57.49 58.78L74.55 68.63L64.44 86.14L47.38 76.29V95.99H27.17V76.29L10.11 86.14L0 68.63L17.06 58.78L0 48.93L10.11 31.43L27.17 41.28V21.58H47.38V41.27Z"/>
    </svg>
    <span class="brand-name">ТУКАЙФ</span>
    <span class="brand-line" aria-hidden="true"></span>
    <span class="brand-note">Переход</span>
  </header>

  <main>
    <p class="eyebrow">Открываем</p>
    <h1 id="product">Telegram</h1>
    <div class="loader" aria-hidden="true"></div>
    <p class="status" id="status" aria-live="polite">Готовим переход...</p>
    <a class="action" id="open-link" href="#" rel="noopener">
      <span id="button-label">Открыть</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 12h13M14 7l5 5-5 5"/>
      </svg>
    </a>
  </main>

  <footer>twokaif.ru</footer>

<script>
(() => {
  const routes = {
    calendar: {
      name: 'Календарь',
      kind: 'telegram',
      username: 'twokaif_calendar_bot',
      button: 'Открыть Календарь'
    },
    agent: {
      name: 'Агент',
      kind: 'telegram',
      username: 'tukaif_agent_bot',
      button: 'Открыть Агента'
    },
    syntx: {
      name: 'Syntx',
      kind: 'telegram',
      username: 'syntxaibot',
      start: 'aff_773591322',
      button: 'Открыть Syntx'
    },
    mzh: {
      name: 'МЖ',
      kind: 'telegram',
      username: 'twokaif_mzh_bot',
      button: 'Открыть МЖ'
    },
    png: {
      name: 'ПНГ',
      kind: 'web',
      url: 'https://png-info.twokaif.ru/',
      button: 'Посмотреть ПНГ'
    },
    wedding: {
      name: 'Свадебная анкета',
      kind: 'web',
      url: 'https://wedding.twokaif.ru/',
      button: 'Посмотреть анкету'
    }
  };

  const slug = location.pathname.split('/').filter(Boolean).pop();
  const route = routes[slug] || routes.calendar;
  const previewMode = new URLSearchParams(location.search).has('preview');
  const product = document.getElementById('product');
  const status = document.getElementById('status');
  const link = document.getElementById('open-link');
  const buttonLabel = document.getElementById('button-label');

  product.textContent = route.name;
  buttonLabel.textContent = route.button;
  document.title = route.name + ' — ТУКАЙФ';

  if (route.kind === 'web') {
    link.href = route.url;
    status.textContent = 'Если страница не открылась сама, нажми кнопку.';
    if (!previewMode) setTimeout(() => location.replace(route.url), 900);
    return;
  }

  const start = route.start ? '&start=' + encodeURIComponent(route.start) : '';
  const webStart = route.start ? '?start=' + encodeURIComponent(route.start) : '';
  const appUrl = 'tg://resolve?domain=' + encodeURIComponent(route.username) + start;
  const webUrl = 'https://telegram.me/' + encodeURIComponent(route.username) + webStart;
  let fallbackTimer = null;

  link.href = webUrl;
  status.textContent = 'Если Telegram не открылся сам, нажми кнопку.';

  function openTelegram(event) {
    if (event) event.preventDefault();
    clearTimeout(fallbackTimer);
    location.href = appUrl;
    fallbackTimer = setTimeout(() => {
      if (document.visibilityState === 'visible') location.href = webUrl;
    }, 1200);
  }

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) clearTimeout(fallbackTimer);
  });
  link.addEventListener('click', openTelegram);
  if (!previewMode) setTimeout(() => { location.href = appUrl; }, 700);
})();
</script>
</body>
</html>
